<svg width="860" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0c4a6e" stop-opacity="1"/>
      <stop offset="60%" stop-color="#0a1628" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="300" fill="url(#bgGlow)" rx="12"/>

  <!-- Deep space particles -->
  <circle cx="43" cy="22" r="1" fill="#ffffff" opacity="0.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="55" r="1.5" fill="#22d3ee" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="210" cy="18" r="1" fill="#ffffff" opacity="0.3"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="310" cy="35" r="1.5" fill="#f59e0b" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="430" cy="12" r="1" fill="#ffffff" opacity="0.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.7s" repeatCount="indefinite"/></circle>
  <circle cx="540" cy="40" r="1.5" fill="#22d3ee" opacity="0.5"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.9s" repeatCount="indefinite"/></circle>
  <circle cx="650" cy="25" r="1" fill="#ffffff" opacity="0.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="5.1s" repeatCount="indefinite"/></circle>
  <circle cx="760" cy="50" r="1.5" fill="#f59e0b" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="820" cy="18" r="1" fill="#ffffff" opacity="0.4"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="75" cy="260" r="1" fill="#22d3ee" opacity="0.3"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.0s" repeatCount="indefinite"/></circle>
  <circle cx="170" cy="275" r="1.5" fill="#ffffff" opacity="0.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="400" cy="280" r="1" fill="#f59e0b" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.3s" repeatCount="indefinite"/></circle>
  <circle cx="600" cy="265" r="1.5" fill="#ffffff" opacity="0.3"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="780" cy="270" r="1" fill="#22d3ee" opacity="0.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="850" cy="255" r="1" fill="#ffffff" opacity="0.3"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.8s" repeatCount="indefinite"/></circle>

  <!-- Orbiting teal ring (left) -->
  <circle cx="110" cy="150" r="55" fill="none" stroke="#22d3ee" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.25">
    <animateTransform attributeName="transform" type="rotate" from="0 110 150" to="360 110 150" dur="20s" repeatCount="indefinite"/>
  </circle>
  <!-- Orbiting gold ring (right) -->
  <circle cx="750" cy="150" r="55" fill="none" stroke="#f59e0b" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.25">
    <animateTransform attributeName="transform" type="rotate" from="360 750 150" to="0 750 150" dur="18s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting dot on teal ring -->
  <circle r="3.5" fill="#22d3ee" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="20s" repeatCount="indefinite">
      <mpath href="#tealOrbit"/>
    </animateMotion>
  </circle>
  <path id="tealOrbit" d="M 165 150 A 55 55 0 1 1 164.9 150" fill="none"/>

  <!-- Orbiting dot on gold ring -->
  <circle r="3.5" fill="#f59e0b" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="18s" repeatCount="indefinite">
      <mpath href="#goldOrbit"/>
    </animateMotion>
  </circle>
  <path id="goldOrbit" d="M 805 150 A 55 55 0 1 0 805.1 150" fill="none"/>

  <!-- Horizontal glow line -->
  <line x1="0" y1="150" x2="860" y2="150" stroke="#22d3ee" stroke-width="0.3" opacity="0.12"/>

  <!-- Central name glow backdrop -->
  <ellipse cx="430" cy="130" rx="280" ry="60" fill="#0e7490" opacity="0.08"/>

  <!-- Main name text -->
  <text x="430" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#textGlow)" letter-spacing="3">
    Jillian Grace D. Burila
    <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Teal accent line under name -->
  <line x1="230" y1="128" x2="630" y2="128" stroke="#22d3ee" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Subtitle -->
  <text x="430" y="158" font-family="'Fira Code', 'Courier New', monospace" font-size="13" fill="#22d3ee" text-anchor="middle" letter-spacing="1" opacity="0.9">
    Software Engineer I — Xeleqt Technology Innovations Inc.
  </text>

  <!-- Tag line -->
  <text x="430" y="188" font-family="'Fira Code', 'Courier New', monospace" font-size="11" fill="#f59e0b" text-anchor="middle" letter-spacing="2" opacity="0.8">
    ◉ React · Node.js · AWS · Fast-Growing Startup
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </text>

  <!-- Bottom badge row -->
  <rect x="195" y="215" width="130" height="26" rx="13" fill="#0c4a6e" stroke="#22d3ee" stroke-width="0.8" opacity="0.8"/>
  <text x="260" y="232" font-family="'Fira Code', monospace" font-size="10" fill="#22d3ee" text-anchor="middle" font-weight="600">⚡ Robothon Champion</text>

  <rect x="340" y="215" width="120" height="26" rx="13" fill="#1c1917" stroke="#f59e0b" stroke-width="0.8" opacity="0.8"/>
  <text x="400" y="232" font-family="'Fira Code', monospace" font-size="10" fill="#f59e0b" text-anchor="middle" font-weight="600">★ Magna Cum Laude</text>

  <rect x="475" y="215" width="130" height="26" rx="13" fill="#0c4a6e" stroke="#22d3ee" stroke-width="0.8" opacity="0.8"/>
  <text x="540" y="232" font-family="'Fira Code', monospace" font-size="10" fill="#22d3ee" text-anchor="middle" font-weight="600">✈ Vietnam Ambassador</text>

  <!-- Bottom pulse line -->
  <line x1="0" y1="298" x2="860" y2="298" stroke="url(#pulseGrad)" stroke-width="2">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </line>
  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="30%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="70%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
